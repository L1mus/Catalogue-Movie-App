<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <link rel="stylesheet" href="../styles/global.css" />
    <link rel="stylesheet" href="../styles/components/navbar.css" />
    <link rel="stylesheet" href="../styles/components/button.css" />
    <link rel="stylesheet" href="../styles/components/form.css" />
    <script src="../scripts/main.js" defer></script>
    <script src="../scripts/pages/login.js" defer></script>
  </head>

  <body>
    <header class="navbar" role="banner">
      <a href="../index.html" class="logo" aria-label="MovieSpace — Home">
        <img
          class="logo-img"
          src="../assets/images/logo.png"
          alt="MovieSpace"
          width="auto"
        />
      </a>

      <nav class="navbar-nav" aria-label="Main navigation">
        <a href="../index.html" class="nav-link">All Films</a>
        <a href="login.html" class="btn btn-accent" aria-current="page">
          Login
        </a>
      </nav>
    </header>

    <main class="auth-page" id="main-content">
      <div class="auth-card">
        <a href="../index.html" class="logo" aria-label="MovieSpace — Home">
          <img
            class="logo-img"
            src="../assets/images/logo.png"
            alt="MovieSpace"
            height="36"
          />
        </a>

        <form
          class="auth-form"
          id="login-form"
          data-js="login-form"
          novalidate
          aria-label="Login form"
        >
          <div class="form-field">
            <label for="email" class="sr-only">Email</label>
            <input
              class="form-input"
              type="email"
              id="email"
              name="email"
              placeholder="Email"
              autocomplete="email"
              required
              aria-required="true"
              aria-describedby="email-error"
              aria-invalid="false"
              data-js="input-email"
            />
            <span
              class="form-field-error"
              id="email-error"
              role="alert"
              aria-live="polite"
              data-js="error-email"
            ></span>
          </div>

          <div class="form-field">
            <label for="password" class="sr-only">Password</label>
            <input
              class="form-input"
              type="password"
              id="password"
              name="password"
              placeholder="Password"
              autocomplete="current-password"
              required
              aria-required="true"
              aria-describedby="password-error"
              aria-invalid="false"
              data-js="input-password"
            />
            <span
              class="form-field-error"
              id="password-error"
              role="alert"
              aria-live="polite"
              data-js="error-password"
            ></span>
          </div>

          <button
            class="btn btn-accent btn-full"
            type="submit"
            data-js="btn-login"
          >
            Login
          </button>

          <p class="auth-link">
            New user?
            <a href="register.html" class="auth-link-cta">Register Here</a>
          </p>
        </form>
      </div>
    </main>
  </body>
</html>
