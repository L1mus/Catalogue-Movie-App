<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Detail</title>

    <link rel="stylesheet" href="../dist/output.css" />

    <script src="scripts/main.js" type="module" defer></script>
    <script
      src="../scripts/pages/movie-details.js"
      type="module"
      defer
    ></script>
  </head>

  <body>
    <header class="navbar" role="banner">
      <a href="../index.html" class="logo" aria-label="MovieSpace — Home">
        <img
          class="logo-img"
          src="../assets/images/logo.png"
          alt="MovieSpace"
        />
      </a>

      <nav class="navbar-nav" aria-label="Main navigation">
        <a href="../index.html" class="nav-link">All Films</a>

        <a
          href="watchlist.html"
          class="nav-link hidden"
          data-js="nav-watchlist"
        >
          My Watchlists
        </a>

        <a href="login.html" class="btn btn-accent" data-js="nav-login">
          Login
        </a>

        <div
          class="avatar hidden"
          data-js="nav-avatar"
          aria-label="User menu"
          role="button"
          tabindex="0"
        ></div>
      </nav>
    </header>

    <main class="container detail-main" id="main-content">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a class="breadcrumb-item" href="../index.html">All Films</a>
        <span class="breadcrumb-slash" aria-hidden="true">/</span>
        <span
          class="breadcrumb-item breadcrumb-item-current"
          aria-current="page"
          data-js="breadcrumb-title"
        ></span>
      </nav>

      <div class="detail-layout" data-js="detail-film"></div>
    </main>
  </body>
</html>
