<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Films</title>

    <link href="./src/output.css" rel="stylesheet" />

    <script src="scripts/main.js" type="module" defer></script>
    <script src="scripts/pages/films.js" type="module" defer></script>
  </head>

  <body>
    <header class="navbar" role="banner">
      <a href="index.html" class="logo" aria-label="MovieSpace — Home">
        <img class="logo-img" src="assets/images/logo.png" alt="MovieSpace" />
      </a>

      <nav class="navbar-nav" aria-label="Main navigation">
        <a
          href="index.html"
          class="nav-link nav-link--active"
          aria-current="page"
        >
          All Films
        </a>

        <a
          href="pages/watchlist.html"
          class="nav-link hidden"
          data-js="nav-watchlist"
        >
          My Watchlists
        </a>

        <a href="pages/login.html" class="btn btn-accent" data-js="nav-login">
          Login
        </a>

        <div
          class="avatar hidden"
          data-js="nav-avatar"
          aria-label="User menu"
          role="button"
          tabindex="0"
        ></div>
      </nav>
    </header>

    <main class="container films-main" id="main-content">
      <h1 class="films-title">
        All Films (
        <span data-js="film-count">0</span> )
      </h1>

      <div class="filter-bar">
        <div class="filter-genre-wrap">
          <button
            class="filter-btn"
            type="button"
            data-js="btn-genre"
            aria-haspopup="listbox"
            aria-expanded="false"
          >
            Genre
            <img
              class="filter-btn-icon"
              src="assets/icons/arrow_drop_down.svg"
              alt=""
              aria-hidden="true"
            />
          </button>
          <ul
            class="genre-dropdown hidden"
            data-js="genre-dropdown"
            role="listbox"
          ></ul>
        </div>

        <button
          class="filter-btn"
          type="button"
          data-js="btn-sort-imdb"
          aria-pressed="false"
        >
          Sort by IMDb
          <img
            class="filter-btn-icon"
            src="assets/icons/swap_vert.svg"
            alt=""
            aria-hidden="true"
            data-js="sort-icon"
          />
        </button>
      </div>

      <ul class="movie-list" data-js="film-list" aria-label="Daftar film"></ul>

      <div class="pagination" data-js="pagination">
        <span class="pagination-info">
          Items per page:
          <span data-js="per-page">10</span>
        </span>

        <span class="pagination-range" data-js="pagination-range"
          >1 - 10 of 100</span
        >

        <button
          class="pagination-btn"
          type="button"
          data-js="btn-prev"
          aria-label="Halaman sebelumnya"
          disabled
        >
          &#8249;
        </button>

        <button
          class="pagination-btn"
          type="button"
          data-js="btn-next"
          aria-label="Halaman berikutnya"
        >
          &#8250;
        </button>
      </div>
    </main>
  </body>
</html>
